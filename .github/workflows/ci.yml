name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Check syntax
        run: uv run python -c "
import py_compile, pathlib;
for f in pathlib.Path().glob('*.py'):
    py_compile.compile(str(f), doraise=True)
"
